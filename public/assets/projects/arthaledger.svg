<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#0f1a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff06" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="360" fill="url(#grid)"/>
  <rect x="0" y="0" width="600" height="3" fill="url(#gold)"/>

  <!-- Terminal window -->
  <rect x="40" y="50" width="520" height="260" rx="10" fill="#0a0a0a" stroke="#1f2a1f" stroke-width="1"/>
  <rect x="40" y="50" width="520" height="32" rx="10" fill="#141f14"/>
  <rect x="40" y="70" width="520" height="12" fill="#141f14"/>
  <circle cx="65" cy="66" r="6" fill="#ff5f57"/>
  <circle cx="85" cy="66" r="6" fill="#ffbd2e"/>
  <circle cx="105" cy="66" r="6" fill="#28c840"/>
  <text x="300" y="71" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">arthaledger — finance api</text>

  <!-- Content -->
  <text x="65" y="110" font-family="'Courier New', monospace" font-size="12" fill="#6ee7b7">$ make run</text>
  <text x="65" y="132" font-family="'Courier New', monospace" font-size="11" fill="#4ade80">✓ PostgreSQL migrations applied (4 files)</text>
  <text x="65" y="152" font-family="'Courier New', monospace" font-size="11" fill="#4ade80">✓ Redis JTI blacklist ready</text>
  <text x="65" y="172" font-family="'Courier New', monospace" font-size="11" fill="#60a5fa">→ 102 unit tests — PASS (0 failures)</text>
  <text x="65" y="192" font-family="'Courier New', monospace" font-size="11" fill="#60a5fa">→ /api/v1/accounts  /api/v1/transactions</text>
  <text x="65" y="212" font-family="'Courier New', monospace" font-size="11" fill="#60a5fa">→ /api/v1/budgets   /api/v1/reports</text>
  <text x="65" y="232" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa">→ Swagger UI: http://localhost:8080/swagger</text>
  <text x="65" y="260" font-family="'Courier New', monospace" font-size="13" fill="#c9a84c" filter="url(#glow)">💰 ArthaLedger listening on :8080</text>
  <text x="65" y="285" font-family="'Courier New', monospace" font-size="11" fill="#555">█▌</text>

  <!-- Tech pills -->
  <rect x="40" y="325" width="48" height="22" rx="11" fill="#00add8" fill-opacity="0.15" stroke="#00add8" stroke-width="1"/>
  <text x="64" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#00add8">Go</text>

  <rect x="98" y="325" width="40" height="22" rx="11" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="118" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">Gin</text>

  <rect x="148" y="325" width="56" height="22" rx="11" fill="#336791" fill-opacity="0.15" stroke="#336791" stroke-width="1"/>
  <text x="176" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#7fb3d3">Postgres</text>

  <rect x="214" y="325" width="48" height="22" rx="11" fill="#dc382d" fill-opacity="0.15" stroke="#dc382d" stroke-width="1"/>
  <text x="238" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#dc382d">Redis</text>

  <rect x="272" y="325" width="40" height="22" rx="11" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="292" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">JWT</text>

  <rect x="322" y="325" width="64" height="22" rx="11" fill="#1d63ed" fill-opacity="0.15" stroke="#1d63ed" stroke-width="1"/>
  <text x="354" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Swagger</text>
</svg>
