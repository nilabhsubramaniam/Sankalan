<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>

  <!-- Gold border ring -->
  <rect x="2" y="2" width="60" height="60" rx="10.5"
        fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>

  <!-- "N" lettermark -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="36"
    font-weight="300"
    letter-spacing="-0.02em"
    fill="#c9a84c"
  >N</text>

  <!-- Tiny gold dot — bottom-right accent -->
  <circle cx="46" cy="46" r="2.5" fill="#c9a84c" opacity="0.7"/>
</svg>
