<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO — Angular SeoService overwrites these per route -->
    <title>Sankalan — Developer Portfolio</title>
    <meta name="description" content="Full-stack developer portfolio showcasing projects, skills, and open-source contributions." />
    <meta name="keywords" content="developer, portfolio, angular, typescript, fullstack, go, three.js" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Nilabh Subramaniam" />

    <!-- Canonical (SeoService manages this dynamically) -->
    <link rel="canonical" href="https://nilabhsubramaniam.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sankalan" />
    <meta property="og:title" content="Sankalan — Developer Portfolio" />
    <meta property="og:description" content="Full-stack developer portfolio showcasing projects, skills, and open-source contributions." />
    <meta property="og:image" content="https://nilabhsubramaniam.in/assets/og-default.jpg" />
    <meta property="og:url" content="https://nilabhsubramaniam.in/" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.nilabhsubramaniam.in" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
